<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agency Dashboard{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #7d8590;
            --text-dim: #484f58;
            --accent: #58a6ff;
            --accent-green: #3fb950;
            --accent-yellow: #d29922;
            --accent-red: #f85149;
            --accent-purple: #bc8cff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span { color: var(--accent); }

        nav { display: flex; gap: 16px; align-items: center; }

        nav a {
            color: var(--text-muted);
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 6px;
        }

        nav a:hover, nav a.active {
            color: var(--text);
            background: var(--bg-tertiary);
            text-decoration: none;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 24px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Session cards */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .count {
            background: var(--bg-tertiary);
            color: var(--text-muted);
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .session-list { display: flex; flex-direction: column; gap: 1px; }

        .session-card {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            transition: border-color 0.15s;
        }

        .session-card:hover { border-color: var(--accent); }

        .session-card.active {
            border-left: 3px solid var(--accent-green);
        }

        .session-main { min-width: 0; }

        .session-summary {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .session-meta .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .badge-active {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
        }

        .badge-repo {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
        }

        .badge-branch {
            background: rgba(188, 140, 255, 0.1);
            color: var(--accent-purple);
        }

        .session-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }

        .btn-primary {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
            border-color: rgba(88, 166, 255, 0.3);
        }

        .btn-primary:hover {
            background: rgba(88, 166, 255, 0.25);
        }

        /* Repo sections */
        .repo-section {
            margin-bottom: 32px;
        }

        .repo-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .repo-header .count {
            background: var(--bg-tertiary);
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: normal;
        }

        /* Search */
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .search-input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .search-input::placeholder { color: var(--text-dim); }

        /* Detail page */
        .detail-header {
            padding: 24px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .detail-title { font-size: 20px; font-weight: 600; }

        .detail-meta {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .tab {
            padding: 8px 16px;
            font-size: 14px;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            cursor: pointer;
        }

        .tab:hover { color: var(--text); }
        .tab.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }

        .conversation { display: flex; flex-direction: column; gap: 16px; }

        .turn {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }

        .turn-user {
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .turn-assistant {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
        }

        .turn-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .turn-user .turn-label { color: var(--accent); }
        .turn-assistant .turn-label { color: var(--accent-green); }

        .checkpoint-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .checkpoint-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .checkpoint-overview {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .file-item {
            font-size: 13px;
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            padding: 4px 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        .file-tool {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 8px;
        }

        /* Launch modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            width: 480px;
            max-width: 90vw;
        }

        .modal h2 {
            font-size: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
        }

        .form-group textarea {
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-dim);
        }

        .search-result {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .search-result-source {
            font-size: 11px;
            color: var(--text-dim);
        }

        .search-result-content {
            font-size: 13px;
            margin-top: 4px;
            max-height: 100px;
            overflow: hidden;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            z-index: 300;
            display: none;
        }

        .toast.show { display: block; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">⚡ <span>Agency</span> Dashboard</div>
            <nav>
                <a href="/" class="{% block nav_dashboard %}{% endblock %}">Dashboard</a>
                <a href="/worktrees" class="{% block nav_worktrees %}{% endblock %}">Worktrees</a>
                <a href="/cleanup" class="{% block nav_cleanup %}{% endblock %}">Cleanup</a>
                <a href="/search" class="{% block nav_search %}{% endblock %}">Search</a>
                <a href="/office" class="{% block nav_office %}{% endblock %}">🏢 The Office</a>
                <a href="/library" class="{% block nav_library %}{% endblock %}">📚 Library</a>
                <button class="btn btn-primary" onclick="showLaunchModal()">+ New Session</button>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 16px; padding-bottom: 48px;">
        {% block content %}{% endblock %}
    </main>

    <!-- Launch Session Modal -->
    <div class="modal-overlay" id="launchModal">
        <div class="modal">
            <h2>Launch New Session</h2>
            <div class="form-group">
                <label>Working Directory</label>
                <input type="text" id="launchCwd" placeholder="/Users/ssmith/code/work/..." value="">
            </div>
            <div class="form-group">
                <label>Initial Prompt (optional)</label>
                <textarea id="launchPrompt" placeholder="e.g., Review the PR comments and fix any issues"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="hideLaunchModal()">Cancel</button>
                <button class="btn btn-primary" onclick="launchSession()">Launch in iTerm2</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function showLaunchModal() {
            document.getElementById('launchModal').classList.add('show');
        }
        function hideLaunchModal() {
            document.getElementById('launchModal').classList.remove('show');
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function launchSession() {
            const cwd = document.getElementById('launchCwd').value;
            const prompt = document.getElementById('launchPrompt').value;
            try {
                const r = await fetch('/api/launch', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cwd, prompt})
                });
                const data = await r.json();
                showToast(data.message);
                hideLaunchModal();
            } catch(e) {
                showToast('Error: ' + e.message);
            }
        }

        async function resumeSession(sessionId) {
            try {
                const r = await fetch(`/api/resume/${sessionId}`, {method: 'POST'});
                const data = await r.json();
                showToast(data.message);
            } catch(e) {
                showToast('Error: ' + e.message);
            }
        }

        // Close modal on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') hideLaunchModal();
        });
        // Close modal on overlay click
        document.getElementById('launchModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) hideLaunchModal();
        });
    </script>
</body>
</html>
